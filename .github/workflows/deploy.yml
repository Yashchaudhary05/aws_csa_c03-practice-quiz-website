name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: python3 -m json.tool questions.json > /dev/null

      - name: Check HTML
        run: |
          if grep -q '<script' index.html && grep -q '<link.*stylesheet' index.html; then
            echo "✅ HTML structure looks good"
          else
            echo "❌ Missing required elements"
            exit 1
          fi

      - name: Verify JS modules exist
        run: |
          for file in js/app.js js/state.js js/quiz.js js/timer.js js/ui.js js/utils.js; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
