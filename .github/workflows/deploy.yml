name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          python3 -m json.tool questions.json > /dev/null
          python3 -m json.tool exams.json > /dev/null
          for f in questions/*.json; do
            python3 -m json.tool "$f" > /dev/null
            echo "✅ Valid: $f"
          done

      - name: Check duplicate question IDs
        run: |
          python3 -c "
          import json, sys, glob
          files = ['questions.json'] + glob.glob('questions/*.json')
          for f in files:
              with open(f) as fh:
                  data = json.load(fh)
              ids = [q['id'] for q in data]
              dupes = [i for i in ids if ids.count(i) > 1]
              if dupes:
                  print(f'❌ Duplicate IDs in {f}: {set(dupes)}')
                  sys.exit(1)
              print(f'✅ No duplicates in {f} ({len(ids)} questions)')
          "

      - name: Check HTML
        run: |
          if grep -q '<script' index.html && grep -q '<link.*stylesheet' index.html; then
            echo "✅ HTML structure looks good"
          else
            echo "❌ Missing required elements"
            exit 1
          fi

      - name: Verify JS modules exist
        run: |
          for file in js/app.js js/state.js js/quiz.js js/timer.js js/ui.js js/utils.js js/toast.js js/confetti.js js/spaced-repetition.js; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
